name: Publish dev-box image

on:
  release:
    types: [published]
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional image tag to attach (e.g. v1.2.3 or stable)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get git tag for this run
        id: get_tag
        run: |
          # if release event
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          # workflow_dispatch with explicit tag input
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            # find tags pointing at this commit
            git fetch --tags --force
            tags=$(git tag --points-at $GITHUB_SHA)

            if [ -z "$tags" ]; then
              echo "tag=" >> $GITHUB_OUTPUT
            else
              # try to select highest semver-like tag (version sort)
              semver_tag=$(echo "$tags" | grep -E '^v?[0-9]+(\.[0-9]+)*$' | sort -V | tail -n1)
              if [ -n "$semver_tag" ]; then
                chosen="$semver_tag"
              else
                # fallback: deterministic lexicographic choice
                chosen=$(echo "$tags" | sort | tail -n1)
              fi
              echo "tag=$chosen" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dev-box:latest
            ghcr.io/${{ github.repository_owner }}/dev-box:${{ github.sha }}

      - name: Retag and push image for git tag
        if: steps.get_tag.outputs.tag != ''
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/dev-box:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/dev-box:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dev-box:${{ steps.get_tag.outputs.tag }}
          docker push ghcr.io/${{ github.repository_owner }}/dev-box:${{ steps.get_tag.outputs.tag }}
