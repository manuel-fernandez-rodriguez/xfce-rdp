name: Publish xfce-rdp image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Optional space-separated image tags to attach (e.g. "v1.2.3 stable")'
        required: false
        default: ''
      image_name:
        description: 'Name of the image to publish (default: dev-box)'
        required: false
        default: 'xfce-rdp'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.event.inputs.image_name || 'xfce-rdp' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get image tags for this run
        id: get_tags
        run: |
          # Determine chosen tags (space-separated when provided via workflow input `tags`)
          chosen_list=""

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            chosen_list="${{ github.event.release.tag_name }}"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tags }}" ]; then
            chosen_list="${{ github.event.inputs.tags }}"
          else
            chosen_list=""
          fi

          # Build up the list of tags to push (one per line)
          TAGS=""

          # Include 'latest' when running on main branch or when this is a release
          if [ "${GITHUB_REF#refs/heads/}" = "main" ] || [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAGS="ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest"
          fi

          # Always include the commit SHA tag
          TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}"

          # If chosen tags exist, include each one (space-separated list)
          if [ -n "$chosen_list" ]; then
            for t in $chosen_list; do
              TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${t}"
            done
          fi

          # Remove any empty lines
          TAGS=$(echo "$TAGS" | sed '/^$/d')

          # Set outputs: the full tags list (newline-separated)
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.get_tags.outputs.tags }}
          provenance: false

      - name: Annotate Release with pushed images
        if: github.event_name == 'release'
        uses: actions/github-script@v6
        env:
          IMAGETAGS: ${{ steps.get_tags.outputs.tags }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tags = (process.env.IMAGETAGS || '').split(/\r?\n/).filter(Boolean);
            if (tags.length === 0) {
              core.info('No image tags to annotate.');
            } else {
              const release = context.payload.release || {};
              const existing = release.body || '';
              let addition = '\n\n### Published container images\n';
              for (const t of tags) {
                addition += `- ${t}\n`;
              }
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: existing + addition
              });
              core.info('Release annotated with image links.');
            }
